name: 抓取 GitHub Trending

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 10:00 北京时间
  workflow_dispatch:       # 支持手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: cd scripts && npm install

      - name: 抓取 Trending 数据
        run: node scripts/github-trending.js > trending-feed.json

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@users.noreply.github.com"
          git add trending-feed.json
          git diff --cached --quiet || git commit -m "chore: update trending feed [skip ci]"
          git push